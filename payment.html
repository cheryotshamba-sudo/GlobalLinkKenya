<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobalLink Kenya - Payment</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b6b0b;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
}

h1{
text-align:center;
color:#1565c0;
margin-bottom:10px;
}

p{
text-align:center;
color:#555;
margin-bottom:20px;
}

.price{
font-size:30px;
font-weight:bold;
color:#0b6b0b;
text-align:center;
margin:20px 0;
}

label{
display:block;
font-weight:bold;
margin-bottom:8px;
}

input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
background:#1565c0;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#status{
margin-top:20px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🌍 GlobalLink Kenya</h1>

<p>Account Activation Fee</p>

<div class="price">KSh 100</div>

<label>M-PESA Phone Number</label>

<input
type="tel"
id="phone"
placeholder="07XXXXXXXX">

<button onclick="payNow()">
Pay with M-PESA
</button>

<div id="status"></div>

</div>

<script>

async function payNow(){

const status = document.getElementById("status");
let phone = document.getElementById("phone").value.trim();

if(phone===""){
status.innerHTML="❌ Enter phone number";
return;
}

phone=phone.replace(/\s/g,"");

if(phone.startsWith("0")){
phone="254"+phone.substring(1);
}

if(phone.length===9 && phone.startsWith("7")){
phone="254"+phone;
}

if(!phone.startsWith("254")){
status.innerHTML="❌ Invalid phone number";
return;
}

status.innerHTML="⏳ Sending STK Push...";

try{

const response=await fetch(
"https://globallink-backend.onrender.com/stkpush",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
phone:phone,
amount:100
})
});

const data=await response.json();

console.log(data);

if(data.success){

status.innerHTML="✅ STK Push sent. Enter your M-PESA PIN.";

if(data.status==="completed"){
status.innerHTML="✅ Payment successful!";
setTimeout(()=>{
window.location.href="success.html";
},1500);
return;
}

if(data.checkout_request_id){
checkPaymentStatus(data.checkout_request_id);
}

}else{

status.innerHTML="❌ "+(data.message || "Failed");

}

}catch(err){

console.log(err);
status.innerHTML="❌ Network error.";

}

}

async function checkPaymentStatus(checkoutId){

const status=document.getElementById("status");

const timer=setInterval(async()=>{

try{

const response=await fetch(
`https://globallink-backend.onrender.com/status?checkout_request_id=${checkoutId}`
);

const data=await response.json();

console.log(data);

if(data.status==="completed"){

clearInterval(timer);

status.innerHTML="✅ Payment successful! Redirecting...";

setTimeout(()=>{
window.location.href="success.html";
},2000);

}
else if(data.status==="failed"){

clearInterval(timer);

status.innerHTML="❌ Payment failed.";

}
else if(data.status==="cancelled"){

clearInterval(timer);

status.innerHTML="❌ Payment cancelled.";

}
else{

status.innerHTML="⏳ Waiting for payment confirmation...";

}

}catch(err){

console.log(err);

}

},3000);

}

</script>

</body>
</html>
