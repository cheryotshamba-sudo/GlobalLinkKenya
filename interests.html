<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobalLink Kenya - Interests</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<div class="header">
<div class="logo">🌍</div>
<h1>GlobalLink Kenya</h1>
<p>Select your interests</p>
</div>

<form id="interestForm">

<h2>Select Your Interests</h2>

<div class="interests">

<label class="interest">
<input type="checkbox" name="interest" value="Friendship">
🤝 Friendship
</label>

<label class="interest">
<input type="checkbox" name="interest" value="Dating">
❤️ Dating
</label>

<label class="interest">
<input type="checkbox" name="interest" value="Remote Jobs">
💼 Remote Jobs
</label>

<label class="interest">
<input type="checkbox" name="interest" value="Business">
📈 Business
</label>

<label class="interest">
<input type="checkbox" name="interest" value="Travel">
✈️ Travel
</label>

<label class="interest">
<input type="checkbox" name="interest" value="Language Exchange">
🗣️ Language Exchange
</label>

<label class="interest">
<input type="checkbox" name="interest" value="Teaching Kiswahili">
📚 Teaching Kiswahili
</label>

<label class="interest">
<input type="checkbox" name="interest" value="International Networking">
🌍 International Networking
</label>

<label class="interest">
<input type="checkbox" name="interest" value="Earn Money Online">
💰 Earn Money Online
</label>

<label class="interest">
<input type="checkbox" name="interest" value="Culture">
🎭 Culture
</label>

</div>

<button type="submit">Continue</button>

</form>

</div>


<script>

document.getElementById("interestForm").addEventListener("submit", function(e){

e.preventDefault();

let selectedInterests = [];

document.querySelectorAll('input[name="interest"]:checked')
.forEach(function(item){

selectedInterests.push(item.value);

});


localStorage.setItem(
"interests",
JSON.stringify(selectedInterests)
);


window.location.href = "payment.html";

});

</script>


</body>
</html>
