<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalLink Kenya</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0b6b0b;
            padding:20px;
        }

        .container{
            max-width:500px;
            margin:auto;
            background:white;
            border-radius:12px;
            padding:20px;
        }

        h1{
            color:#1565c0;
            text-align:center;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#555;
            margin-bottom:20px;
            font-size:15px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:6px;
            font-weight:bold;
        }

        input,select{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        .interest{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:10px;
            margin-top:10px;
        }

        .interest label{
            background:#f2f2f2;
            padding:10px;
            border-radius:8px;
            font
