<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GlobalLink Kenya</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b6b0b;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
}

h1{
text-align:center;
color:#1565c0;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#555;
margin-bottom:20px;
font-size:15px;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

.interest{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.interest label{
background:#f2f2f2;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:normal;
}

button{
width:100%;
padding:15px;
margin-top:25px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

</style>

</head>

<body>

<div class="container">

<h1>🌍 GlobalLink Kenya</h1>

<p class="subtitle">
Connect with global friends, remote jobs, language exchange and international opportunities.
</p>

<form onsubmit="event.preventDefault(); goToPayment();">

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Age</label>
<input type="number" min="18" placeholder="18" required>

<label>Gender</label>
<select required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Country</label>
<select required>
<option>Kenya</option>
</select>

<label>City</label>
<input type="text" placeholder="Nairobi" required>

<label>Phone Number</label>
<input type="tel" placeholder="+2547XXXXXXXX" required>

<label>Select Your Interests</label>

<div class="interest">

<label><input type="checkbox"> 💼 Remote Jobs</label>

<label><input type="checkbox"> 💰 Earn Money Online</label>

<label><input type="checkbox"> 📚 Teaching Kiswahili</label>

<label><input type="checkbox"> 🌍 International Networking</label>

</div>

<button type="submit">Continue</button>

</form>

</div>

<script>

function goToPayment(){

window.location.href="payment.html";

}

</script>

</body>
</html>
