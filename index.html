<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobalLink Kenya</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0d47a1,#2e7d32);
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
border-radius:18px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
font-size:60px;
text-align:center;
}

h1{
text-align:center;
color:#1565c0;
margin-top:10px;
}

.subtitle{
text-align:center;
color:#555;
margin:10px 0 25px;
line-height:1.5;
}

label{
display:block;
margin-top:15px;
margin-bottom:6px;
font-weight:bold;
color:#333;
}

input,select{
width:100%;
padding:13px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

input:focus,
select:focus{
outline:none;
border-color:#1565c0;
}

h3{
margin-top:25px;
margin-bottom:15px;
color:#1565c0;
text-align:center;
}

.interests{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
border:2px solid #e5e5e5;
border-radius:12px;
padding:12px;
text-align:center;
cursor:pointer;
transition:.3s;
background:#fafafa;
}

.card:hover{
border-color:#1565c0;
transform:translateY(-2px);
}

.card input{
margin-bottom:8px;
}

.icon{
font-size:28px;
display:block;
margin-bottom:8px;
}

button{
width:100%;
padding:15px;
margin-top:30px;
background:#1565c0;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

@media(max-width:500px){
.interests{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<div class="container">

<div class="logo">🌍</div>

<h1>GlobalLink Kenya</h1>

<p class="subtitle">
Meet people around the world, discover remote jobs, teach Kiswahili, make international friends and unlock global opportunities.
</p>

<form onsubmit="event.preventDefault(); window.location='payment.html';">

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Age</label>
<input type="number" min="18" required>

<label>Gender</label>
<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Country</label>
<select>
<option>Kenya</option>
</select>

<label>City</label>
<input type="text" placeholder="Nairobi" required>

<label>Phone Number</label>
<input type="tel" placeholder="+2547XXXXXXXX" required>

<h3>Select Your Interests</h3>

<div class="interests">

<label class="card">
<input type="checkbox">
<span class="icon">💼</span>
Remote Jobs
</label>

<label class="card">
<input type="checkbox">
<span class="icon">💰</span>
Earn Money Online
</label>

<label class="card">
<input type="checkbox">
<span class="icon">📚</span>
Teaching Kiswahili
</label>

<label class="card">
<input type="checkbox">
<span class="icon">🌍</span>
International Networking
</label>

<label class="card">
<input type="checkbox">
<span class="icon">✈️</span>
Going Abroad
</label>

<label class="card">
<input type="checkbox">
<span class="icon">💬</span>
Chatting With Foreigners
</label>

<label class="card">
<input type="checkbox">
<span class="icon">👨‍💻</span>
Freelancing
</label>

<label class="card">
<input type="checkbox">
<span class="icon">📈</span>
Business Opportunities
</label>

</div>

<button type="submit">Continue →</button>

</form>

</div>

</body>
</html>
